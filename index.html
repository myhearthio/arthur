<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arthur — Private AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d0d14;
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: white;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #f0f0f0; }
    header .subtitle { font-size: 12px; color: #666; margin-left: auto; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 720px;
      line-height: 1.6;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #1e1e3a;
      border: 1px solid #2a2a4a;
      color: #d0d0f0;
    }
    .message.assistant {
      align-self: flex-start;
      background: #111118;
      border: 1px solid #1a1a2e;
      color: #c8c8d8;
    }
    .message.system {
      align-self: center;
      background: transparent;
      color: #555;
      font-size: 13px;
      font-style: italic;
    }
    .typing {
      align-self: flex-start;
      color: #6366f1;
      font-size: 14px;
      padding: 8px 16px;
    }
    .typing::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #1a1a2e;
      background: #0d0d14;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #input-area textarea {
      flex: 1;
      background: #111118;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 15px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
    }
    #input-area textarea:focus {
      border-color: #6366f1;
    }
    #input-area textarea::placeholder {
      color: #444;
    }
    #input-area button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    #input-area button:hover { opacity: 0.9; }
    #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="logo">A</div>
    <h1>Arthur</h1>
    <span class="subtitle">Private AI</span>
  </header>
  <div id="chat">
    <div class="message system">Arthur is ready.</div>
  </div>
  <div id="input-area">
    <textarea id="userInput" placeholder="Message Arthur..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
  <script>
    const ARTHUR_PROXY = 'https://qhcodllhplnsizinldwx.supabase.co/functions/v1/arthur-chat';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoY29kbGxocGxuc2l6aW5sZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2Njc1MjcsImV4cCI6MjA5MDI0MzUyN30.i-pNhVkpUoGEoWq0hLA-obx6KxvBGTX1tMmwdMVc7qw';

    const SYSTEM_PROMPT = `You are Arthur, Ben Lalez's private AI assistant. You are thoughtful, direct, and strategic. You help Ben think through business decisions, manage his AI agent infrastructure (the "hive"), track retirement planning, and stay on top of family and health priorities. You speak like a trusted advisor — no fluff, no filler. When you don't know something, say so. When something matters, flag it.`;

    let conversationHistory = [];
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    });

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.textContent = 'Arthur is thinking';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      showTyping();

      try {
        const response = await fetch(ARTHUR_PROXY, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: conversationHistory
          })
        });

        hideTyping();

        if (!response.ok) {
          const err = await response.text();
          addMessage('system', `Error: ${response.status}`);
          console.error(err);
          sendBtn.disabled = false;
          return;
        }

        const data = await response.json();
        const reply = data.content?.[0]?.text || 'No response.';
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('assistant', reply);
      } catch (err) {
        hideTyping();
        addMessage('system', `Connection error: ${err.message}`);
        console.error(err);
      }

      sendBtn.disabled = false;
      input.focus();
    }

    input.focus();
  </script>
</body>
</html>
